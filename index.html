<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koin · Fina</title>
<meta name="description" content="Личен финансов асистент с AI — бюджет, фактури, банкова интеграция">
<meta name="theme-color" content="#0e1320">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Koin">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Themes ── */
body.koin {
  --acc: #c8f075; --acc-dim: rgba(200,240,117,0.1); --acc-border: rgba(200,240,117,0.28);
  --acc-text: #0e1320; --hbg: #0e1320; --sbg: #0e1320;
  --lf: 'DM Mono',monospace; --ls: normal;
  --btn-bg: #c8f075; --btn-txt: #0e1320;
  --ai-bg: #0e1320; --ai-txt: rgba(255,255,255,.85); --ai-name: #c8f075;
  --nav-txt: rgba(255,255,255,.5); --nav-active: rgba(200,240,117,.12); --nav-active-txt: #c8f075;
}
body.fina {
  --acc: #9b4dca; --acc-dim: rgba(155,77,202,0.07); --acc-border: rgba(155,77,202,0.2);
  --acc-text: #fff; --hbg: #fdf7f2; --sbg: #fdf7f2;
  --lf: 'Playfair Display',serif; --ls: italic;
  --btn-bg: #9b4dca; --btn-txt: #fff;
  --ai-bg: #fdf0f6; --ai-txt: #3a1a4a; --ai-name: #9b4dca;
  --nav-txt: #8a7a6a; --nav-active: rgba(155,77,202,.07); --nav-active-txt: #9b4dca;
}

html,body { height:100%; font-family:'DM Sans',sans-serif; background:#f5f4f0; color:#1c1c1c; font-size:14px; }

/* ════════════════════════════════════════
   ONBOARDING
════════════════════════════════════════ */
#onboarding {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:32px 20px; background:#f5f4f0;
}
.ob-wrap { width:100%; max-width:580px; display:flex; flex-direction:column; align-items:center; }
.ob-steps { display:flex; gap:6px; margin-bottom:40px; }
.ob-dot { width:6px; height:6px; border-radius:50%; background:rgba(0,0,0,.15); transition:all .3s; }
.ob-dot.active { background:#1c1c1c; width:20px; border-radius:3px; }
.ob-dot.done { background:#1D9E75; }
.ob-eyebrow { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.1em; color:#aaa; text-transform:uppercase; margin-bottom:10px; text-align:center; }
.ob-title { font-size:28px; font-weight:400; text-align:center; margin-bottom:8px; }
.ob-sub { font-size:14px; color:#888; text-align:center; margin-bottom:36px; line-height:1.5; max-width:400px; }

/* Persona cards */
.p-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%; margin-bottom:14px; }
.p-card { border-radius:18px; padding:24px 20px; cursor:pointer; border:2px solid transparent; transition:transform .18s, border-color .18s; user-select:none; position:relative; overflow:hidden; }
.p-card:hover { transform:translateY(-3px); }
.p-card.koin-c { background:#0e1320; }
.p-card.fina-c { background:#fdf7f2; border-color:rgba(0,0,0,.08); }
.p-card.sel.koin-c { border-color:#c8f075; box-shadow:0 0 0 4px rgba(200,240,117,.1); }
.p-card.sel.fina-c { border-color:#9b4dca; box-shadow:0 0 0 4px rgba(155,77,202,.08); }
.p-check { position:absolute; top:14px; right:14px; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s; }
.p-card.sel .p-check { opacity:1; }
.p-card.sel.koin-c .p-check { background:#c8f075; }
.p-card.sel.fina-c .p-check { background:#9b4dca; }
.p-name-k { font-family:'DM Mono',monospace; font-size:28px; font-weight:500; color:#c8f075; margin-bottom:6px; line-height:1; }
.p-name-f { font-family:'Playfair Display',serif; font-style:italic; font-size:30px; color:#9b4dca; margin-bottom:6px; line-height:1; }
.p-tag-k { font-size:12px; color:rgba(255,255,255,.4); margin-bottom:16px; }
.p-tag-f { font-size:12px; color:#aaa; margin-bottom:16px; }
.p-traits { display:flex; flex-wrap:wrap; gap:5px; }
.trait-k { font-size:11px; padding:2px 8px; border-radius:99px; background:rgba(200,240,117,.1); color:#c8f075; border:1px solid rgba(200,240,117,.2); }
.trait-f { font-size:11px; padding:2px 8px; border-radius:99px; background:rgba(155,77,202,.08); color:#9b4dca; border:1px solid rgba(155,77,202,.15); }

/* Plan cards */
.plan-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%; margin-bottom:24px; }
.plan-card { border-radius:14px; border:1.5px solid rgba(0,0,0,.1); background:#fff; padding:20px; cursor:pointer; transition:transform .15s, border-color .15s; user-select:none; }
.plan-card:hover { transform:translateY(-2px); }
.plan-card.sel-free { border-color:#1D9E75; box-shadow:0 0 0 3px rgba(29,158,117,.08); }
.plan-card.sel-pro  { border-color:#7F77DD; box-shadow:0 0 0 3px rgba(127,119,221,.1); }
.plan-badge { display:inline-block; font-size:11px; font-weight:500; padding:2px 9px; border-radius:99px; margin-bottom:12px; }
.pb-free { background:#E1F5EE; color:#085041; }
.pb-pro  { background:#EEEDFE; color:#3C3489; }
.plan-price { font-size:24px; font-weight:500; margin-bottom:2px; }
.plan-price-s { font-size:12px; color:#aaa; margin-bottom:14px; }
.plan-feat { display:flex; align-items:flex-start; gap:7px; font-size:13px; margin-bottom:7px; line-height:1.4; }
.pf-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; margin-top:5px; }
.pf-free { background:#1D9E75; } .pf-pro { background:#7F77DD; } .pf-lock { background:#ddd; }
.pf-dim { color:#aaa; }
.pop-label { font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:.06em; color:#7F77DD; text-align:center; margin-bottom:6px; }

/* Name screen */
.name-sug-wrap { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:18px; width:100%; }
.name-sug { padding:7px 16px; border-radius:99px; border:1.5px solid rgba(0,0,0,.14); background:#fff; font-size:14px; cursor:pointer; transition:all .15s; color:#1c1c1c; }
.name-sug.picked-k { border-color:#c8f075; background:rgba(200,240,117,.08); color:#2a4a08; }
.name-sug.picked-f { border-color:#9b4dca; background:rgba(155,77,202,.06); color:#9b4dca; }

/* Shared OB */
.ob-note { font-size:12px; color:#aaa; text-align:center; margin-bottom:24px; }
.ob-back { background:none; border:none; font-size:13px; color:#aaa; cursor:pointer; font-family:'DM Sans',sans-serif; margin-bottom:28px; align-self:flex-start; display:flex; align-items:center; gap:4px; transition:color .15s; padding:0; }
.ob-back:hover { color:#1c1c1c; }
.ob-btn { width:100%; padding:13px; border-radius:12px; border:none; font-size:15px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; transition:opacity .15s; }
.ob-btn:hover { opacity:.88; }
.ob-btn:disabled { opacity:.3; cursor:not-allowed; }
.ob-btn-k { background:#c8f075; color:#0e1320; }
.ob-btn-f { background:#9b4dca; color:#fff; }
.ob-btn-n { background:#1c1c1c; color:#f5f4f0; }

.name-input-ob { width:100%; padding:12px 16px; border:1.5px solid rgba(0,0,0,.14); border-radius:12px; font-size:15px; font-family:'DM Sans',sans-serif; outline:none; margin-bottom:24px; transition:border-color .15s; background:#fff; color:#1c1c1c; }
.name-input-ob:focus { border-color:rgba(0,0,0,.3); }

.welcome-av { width:72px; height:72px; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:26px; margin:0 auto 20px; }
.av-k { background:#0e1320; font-family:'DM Mono',monospace; font-weight:500; color:#c8f075; }
.av-f { background:#fdf0f6; font-family:'Playfair Display',serif; font-style:italic; color:#9b4dca; border:1.5px solid rgba(155,77,202,.2); border-radius:50%; }
.first-msg { width:100%; border-radius:14px; padding:14px 18px; margin-bottom:24px; font-size:14px; line-height:1.6; }
.fm-k { background:#0e1320; color:rgba(255,255,255,.85); border-radius:3px 14px 14px 14px; }
.fm-f { background:#fdf0f6; color:#3a1a4a; border:1px solid rgba(155,77,202,.15); border-radius:3px 14px 14px 14px; }
.fm-name { font-size:10px; font-family:'DM Mono',monospace; letter-spacing:.06em; margin-bottom:8px; }
.fm-name-k { color:#c8f075; } .fm-name-f { color:#9b4dca; }

@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeUp .3s ease both; }

/* ════════════════════════════════════════
   MAIN APP
════════════════════════════════════════ */
#app { height:100vh; display:none; flex-direction:column; }

.app-hdr { background:var(--hbg); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; border-bottom:.5px solid rgba(0,0,0,.08); }
.app-hdr-l { display:flex; align-items:center; gap:12px; }
.app-logo { font-family:var(--lf); font-style:var(--ls); font-size:18px; color:var(--acc); }
.hdr-sep { width:1px; height:14px; background:rgba(255,255,255,.1); }
body.fina .hdr-sep { background:rgba(0,0,0,.1); }
.hdr-section { font-size:13px; color:rgba(255,255,255,.45); }
body.fina .hdr-section { color:#aaa; }
.app-hdr-r { display:flex; align-items:center; gap:8px; }
.plan-p { font-size:11px; font-family:'DM Mono',monospace; padding:3px 10px; border-radius:99px; background:var(--acc-dim); border:1px solid var(--acc-border); color:var(--acc); }
.psw { display:flex; background:rgba(255,255,255,.06); border-radius:8px; padding:3px; gap:2px; }
body.fina .psw { background:rgba(0,0,0,.06); }
.psw-b { padding:4px 10px; border-radius:6px; border:none; font-size:12px; cursor:pointer; font-family:'DM Sans',sans-serif; background:transparent; color:rgba(255,255,255,.45); transition:all .15s; }
body.fina .psw-b { color:#aaa; }
.psw-b.active { background:var(--acc); color:var(--acc-text); font-weight:500; }

/* Sidebar + content */
.app-body { flex:1; display:flex; overflow:hidden; }

.sidebar { width:210px; flex-shrink:0; background:var(--sbg); border-right:.5px solid rgba(0,0,0,.07); display:flex; flex-direction:column; padding:10px; overflow:hidden; }
.nav-section-lbl { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--nav-txt); opacity:.6; padding:10px 10px 4px; }
.nav-item { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:8px; color:var(--nav-txt); cursor:pointer; font-size:13px; transition:all .15s; margin-bottom:1px; }
.nav-item:hover { background:var(--nav-active); color:var(--nav-active-txt); }
.nav-item.active { background:var(--nav-active); color:var(--nav-active-txt); font-weight:500; }
.nav-icon { width:15px; height:15px; flex-shrink:0; opacity:.7; }
.nav-item.active .nav-icon,.nav-item:hover .nav-icon { opacity:1; }
.sidebar-upg { margin-top:auto; padding:12px; background:var(--acc-dim); border:1px solid var(--acc-border); border-radius:10px; }
.upg-t { font-size:12px; font-weight:500; color:var(--acc); margin-bottom:3px; }
body.koin .upg-t { color:#4a6a12; }
.upg-d { font-size:11px; color:var(--nav-txt); margin-bottom:8px; line-height:1.4; }
.upg-btn { width:100%; padding:7px; border-radius:8px; border:none; background:var(--btn-bg); color:var(--btn-txt); font-size:12px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; }
.sidebar-user { padding:12px 10px 4px; border-top:.5px solid rgba(255,255,255,.06); margin-top:10px; display:flex; align-items:center; gap:8px; }
body.fina .sidebar-user { border-top-color:rgba(0,0,0,.06); }
.user-av { width:28px; height:28px; border-radius:50%; background:var(--acc-dim); border:1px solid var(--acc-border); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:500; color:var(--acc); flex-shrink:0; }
body.koin .user-av { color:#4a6a12; }
.user-lbl { font-size:12px; color:var(--nav-txt); }

/* Main content */
.content { flex:1; overflow:hidden; display:flex; flex-direction:column; }

/* shared */
.btn { padding:6px 13px; border-radius:8px; border:.5px solid rgba(0,0,0,.14); background:transparent; font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; color:#1c1c1c; transition:background .12s; }
.btn:hover { background:#f5f4f0; }
.btn.pri { background:var(--btn-bg); color:var(--btn-txt); border-color:transparent; font-weight:500; }
.btn.pri:hover { opacity:.88; background:var(--btn-bg); }

/* ── DASHBOARD ── */
.dash { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
.dash::-webkit-scrollbar { width:4px; }
.dash::-webkit-scrollbar-thumb { background:rgba(0,0,0,.08); border-radius:2px; }
.alert-banner { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px; background:#FAEEDA; border:.5px solid #FAC775; font-size:13px; color:#633806; }
.al-dot { width:5px; height:5px; border-radius:50%; background:#BA7517; flex-shrink:0; }
.al-act { margin-left:auto; font-size:12px; color:#854F0B; font-weight:500; cursor:pointer; white-space:nowrap; }
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.stat-c { background:#fff; border-radius:12px; padding:14px; border:.5px solid rgba(0,0,0,.07); }
.stat-lbl { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:#aaa; margin-bottom:5px; }
.stat-val { font-size:20px; font-weight:500; line-height:1; margin-bottom:3px; }
.sv-pos { color:#1D9E75; } .sv-neg { color:#e24b4a; } .sv-neu { color:#1c1c1c; }
.stat-chg { font-size:11px; font-family:'DM Mono',monospace; }
.chg-up { color:#1D9E75; } .chg-dn { color:#e24b4a; } .chg-nt { color:#aaa; }
.two-col { display:grid; grid-template-columns:1fr 320px; gap:14px; }
.card { background:#fff; border-radius:14px; border:.5px solid rgba(0,0,0,.07); overflow:hidden; }
.card-hdr { padding:12px 16px; border-bottom:.5px solid rgba(0,0,0,.06); display:flex; align-items:center; justify-content:space-between; }
.card-t { font-size:13px; font-weight:500; }
.card-act { font-size:12px; color:#aaa; cursor:pointer; transition:color .12s; }
.card-act:hover { color:var(--acc); }
.card-bd { padding:14px 16px; }
.bar-chart { display:flex; flex-direction:column; gap:9px; }
.bar-row { display:flex; align-items:center; gap:9px; }
.bar-lbl { width:70px; font-size:12px; color:#aaa; text-align:right; flex-shrink:0; }
.bar-track { flex:1; height:6px; background:#f0efe9; border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; }
.bf-exp { background:#e24b4a; } .bf-acc { background:var(--acc); }
.bar-amt { font-size:12px; font-family:'DM Mono',monospace; color:#666; min-width:55px; text-align:right; }
.tx-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:.5px solid rgba(0,0,0,.05); }
.tx-row:last-child { border-bottom:none; }
.tx-ico { width:30px; height:30px; border-radius:8px; background:#f5f4f0; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.tx-inf { flex:1; min-width:0; }
.tx-name { font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-cat { font-size:11px; color:#aaa; }
.tx-dt { font-size:11px; color:#ccc; flex-shrink:0; }
.tx-amt { font-size:13px; font-weight:500; font-family:'DM Mono',monospace; flex-shrink:0; }
.goal-item { margin-bottom:12px; }
.goal-item:last-child { margin-bottom:0; }
.goal-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
.goal-name { font-size:13px; }
.goal-pct { font-size:12px; font-family:'DM Mono',monospace; color:#aaa; }
.goal-track { height:5px; background:#f0efe9; border-radius:3px; overflow:hidden; margin-bottom:3px; }
.goal-fill { height:100%; border-radius:3px; background:var(--acc); }
.goal-sub { font-size:11px; color:#bbb; }
.lock-row { display:flex; align-items:center; gap:8px; padding:10px 12px; background:var(--acc-dim); border:1px solid var(--acc-border); border-radius:8px; margin-top:10px; font-size:12px; }
.lock-upg { margin-left:auto; font-size:12px; font-weight:500; color:var(--acc); cursor:pointer; white-space:nowrap; }
body.koin .lock-upg { color:#4a6a12; }

/* ── AI CHAT ── */
.ai-panel { display:flex; flex-direction:column; height:100%; }
.ai-limit-lbl { font-size:10px; font-family:'DM Mono',monospace; }
.ai-msgs { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:10px; max-height:260px; }
.ai-msgs::-webkit-scrollbar { width:3px; }
.ai-msgs::-webkit-scrollbar-thumb { background:rgba(0,0,0,.08); border-radius:2px; }
.msg-g { display:flex; flex-direction:column; gap:3px; }
.msg-g.user { align-items:flex-end; }
.msg-lbl { font-size:10px; font-family:'DM Mono',monospace; letter-spacing:.05em; }
.msg-lbl.ai { color:var(--ai-name); } .msg-lbl.user { color:#bbb; }
.bubble { padding:9px 12px; font-size:13px; line-height:1.55; max-width:88%; }
.bubble.ai { background:var(--ai-bg); color:var(--ai-txt); border-radius:3px 11px 11px 11px; }
.bubble.user { background:#f0efe9; color:#1c1c1c; border-radius:11px 3px 11px 11px; }
.typing-b { display:flex; gap:4px; align-items:center; }
.td { width:5px; height:5px; border-radius:50%; background:var(--ai-name); opacity:.4; animation:tdot 1.2s ease-in-out infinite; }
.td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{opacity:.3;transform:scale(1)}30%{opacity:1;transform:scale(1.2)}}
.quick-chips { padding:8px 12px 0; display:flex; gap:5px; flex-wrap:wrap; }
.chip { font-size:11px; padding:4px 10px; border-radius:99px; border:.5px solid rgba(0,0,0,.15); background:transparent; color:#888; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .12s; white-space:nowrap; }
.chip:hover { border-color:var(--acc); color:#1c1c1c; background:var(--acc-dim); }
.ai-inp-row { padding:8px 12px; border-top:.5px solid rgba(0,0,0,.06); display:flex; gap:7px; align-items:flex-end; }
.ai-inp { flex:1; padding:7px 11px; border:.5px solid rgba(0,0,0,.14); border-radius:8px; font-size:13px; font-family:'DM Sans',sans-serif; outline:none; background:#fff; resize:none; max-height:70px; transition:border-color .15s; }
.ai-inp:focus { border-color:var(--acc); }
.ai-send { width:30px; height:30px; border-radius:8px; border:none; background:var(--btn-bg); color:var(--btn-txt); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:opacity .15s; }
.ai-send:hover { opacity:.85; }
.ai-send:disabled { opacity:.3; cursor:not-allowed; }
.upg-prompt { margin:0 12px 10px; padding:10px 14px; background:var(--acc-dim); border:1px solid var(--acc-border); border-radius:8px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
.upg-prompt span { font-size:12px; color:#666; }
.upg-prompt button { padding:5px 12px; border-radius:7px; border:none; background:var(--btn-bg); color:var(--btn-txt); font-size:12px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; white-space:nowrap; }

/* ── BANK ── */
.bank-page { flex:1; overflow-y:auto; padding:20px; }
.bank-page::-webkit-scrollbar { width:4px; }
.bank-hero { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
.bank-card { background:#fff; border-radius:14px; border:.5px solid rgba(0,0,0,.07); padding:20px; }
.bank-card.pro-only { opacity:.6; position:relative; overflow:hidden; }
.pro-overlay { position:absolute; inset:0; background:rgba(255,255,255,.5); display:flex; align-items:center; justify-content:center; backdrop-filter:blur(2px); }
.pro-badge { background:var(--btn-bg); color:var(--btn-txt); padding:8px 16px; border-radius:99px; font-size:13px; font-weight:500; cursor:pointer; }
.bcard-ico { width:40px; height:40px; border-radius:10px; background:var(--acc-dim); border:1px solid var(--acc-border); display:flex; align-items:center; justify-content:center; margin-bottom:12px; }
.bcard-t { font-size:14px; font-weight:500; margin-bottom:4px; }

<script>
// ── Supabase Init ─────────────────────────────────────────────────
const _supa = window.supabase.createClient('https://fuxbtrdxzjtnetkonzwu.supabase.co', 'sb_publishable_tDsZQhjtut2-a6E1eaaLpg_onyR6pmp');
window._supabase = _supa;

// Auth helpers
window._sbAuth = {
  async signUp(email, password, name) {
    const { data, error } = await _supa.auth.signUp({
      email, password,
      options: { data: { name } }
    });
    return { data, error };
  },
  async signIn(email, password) {
    const { data, error } = await _supa.auth.signInWithPassword({ email, password });
    return { data, error };
  },
  async signOut() {
    await _supa.auth.signOut();
    window.location.reload();
  },
  async getUser() {
    const { data: { user } } = await _supa.auth.getUser();
    return user;
  },
  async saveData(table, data) {
    const user = await this.getUser();
    if (!user) return null;
    const { data: result, error } = await _supa
      .from(table)
      .upsert({ ...data, user_id: user.id }, { onConflict: 'id' });
    return { result, error };
  },
  async loadData(table) {
    const user = await this.getUser();
    if (!user) return [];
    const { data, error } = await _supa
      .from(table)
      .select('*')
      .eq('user_id', user.id);
    return data || [];
  }
};

function parseSmartInput(text) {
  const results = [];
  const lower = text.toLowerCase();
  // Split by commas, "и", whitespace groups
  const parts = lower.split(/[,\n]+/).map(p => p.trim()).filter(Boolean);

  for (const part of parts) {
    // Try to find known keywords
    let matched = false;
    for (const [keyword, [catId, emoji, defaultPrice]] of Object.entries(SMART_KEYWORDS)) {
      if (part.includes(keyword)) {
        // Extract amount if mentioned
        const amtMatch = part.match(/(\d+[\.,]\d{1,2}|\d+)\s*(лв|лева|€|$)?/);
        const amount = amtMatch ? parseFloat(amtMatch[1].replace(',','.')) : defaultPrice;
        results.push({
          name: keyword.charAt(0).toUpperCase() + keyword.slice(1),
          emoji,
          catId,
          amount,
          rawText: part
        });
        matched = true;
        break;
      }
    }
    if (!matched && part.length > 2) {
      // Unknown item — default to Разни
      const amtMatch = part.match(/(\d+[\.,]\d{1,2}|\d+)\s*(лв|лева)?/);
      const amount = amtMatch ? parseFloat(amtMatch[1].replace(',','.')) : 5.00;
      const name = part.replace(/\d+[\.,]?\d*\s*(лв|лева)?/g,'').trim();
      if (name.length > 1) {
        results.push({ name: name.charAt(0).toUpperCase() + name.slice(1), emoji:'📦', catId:'ce8', amount, rawText: part });
      }
    }
  }
  return results;
}

function numWords(n) {
  const ones=['нула','един','два','три','четири','пет','шест','седем','осем','девет','десет','единадесет','дванадесет','тринадесет','четиринадесет','петнадесет','шестнадесет','седемнадесет','осемнадесет','деветнадесет'];
  const tens=['','','двадесет','тридесет','четиридесет','петдесет','шестдесет','седемдесет','осемдесет','деветдесет'];
  const h=['','сто','двеста','триста','четиристотин','петстотин','шестотин','седемстотин','осемстотин','деветстотин'];
  if(n===0)return'нула';
  const hh=Math.floor(n/100),t=Math.floor((n%100)/10),o=n%10;
  let r='';
  if(hh>0)r+=h[hh]+(t||o?' ':'');
  if(n%100<20&&n%100>0)r+=ones[n%100];
  else{if(t>1)r+=tens[t]+(o?' и '+ones[o]:'');else if(o>0)r+=ones[o];}
  return r.trim();
}
function amtWords(tot){const lv=Math.floor(tot),st=Math.round((tot-lv)*100);let w=numWords(lv);w=w.charAt(0).toUpperCase()+w.slice(1);return`${w} лева${st>0?' и '+numWords(st)+' стотинки':''}`;}

function getFallback(text) {
  const t=text.toLowerCase(),fb=FALLBACK[S.persona];
  if(t.includes('ддс')||t.includes('данък'))return fb.vat;
  if(t.includes('маркетинг')||t.includes('реклам'))return fb.marketing;
  if(t.includes('служител'))return fb.employee;
  return fb.default;
}

async function sendAI(preset) {
  if(S.aiLoading)return;
  const inp=document.getElementById('ai-inp');
  const text=preset||inp?.value.trim();
  if(!text)return;
  if(S.plan==='free'&&S.aiCount>=S.aiMax){document.getElementById('ai-upg-bar').style.display='';return;}
  if(inp)inp.value='',inp.style.height='auto';
  S.aiLoading=true;
  const sendBtn=document.getElementById('ai-send');
  if(sendBtn)sendBtn.disabled=true;
  addAIMsg(text,'user');
  S.aiHistory.push({role:'user',content:text});
  if(S.plan==='free'){S.aiCount++;updateAILimit();}
  showTyping();

  // Try real API, fallback to preset responses
  try {
    if (ANTHROPIC_API_KEY === 'ANTHROPIC_KEY_HERE') throw new Error('no key');
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':ANTHROPIC_API_KEY,'anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:S.plan==='pro'?'claude-haiku-4-5-20251001':'claude-haiku-4-5-20251001',max_tokens:S.plan==='pro'?600:300,system:SYS[S.persona](S.aiName,S.plan,FIN_CTX),messages:S.aiHistory.slice(-8)})
    });
    removeTyping();
    if(resp.ok){const d=await resp.json();const reply=d.content?.[0]?.text||'...';addAIMsg(reply,'ai');S.aiHistory.push({role:'assistant',content:reply});}
    else throw new Error('API error');
  } catch(e) {
    removeTyping();
    await new Promise(r=>setTimeout(r,600));
    const reply=getFallback(text);
    addAIMsg(reply,'ai');
    S.aiHistory.push({role:'assistant',content:reply});
  }

  S.aiLoading=false;
  if(sendBtn)sendBtn.disabled=false;
  if(S.plan==='free'&&S.aiCount>=S.aiMax){const bar=document.getElementById('ai-upg-bar');if(bar)bar.style.display='';}
}

function addAIMsg(text,role) {
  const msgs=document.getElementById('ai-msgs');
  if(!msgs)return;
  const g=document.createElement('div');
  g.className='msg-g '+(role==='user'?'user':'ai')+' fade-in';
  const lbl=document.createElement('div');
  lbl.className='msg-lbl '+(role==='user'?'user':'ai');
  lbl.textContent=role==='user'?'ТИ':(S.aiName||'AI').toUpperCase();
  const b=document.createElement('div');
  b.className='bubble '+role;
  b.textContent=text;
  g.appendChild(lbl); g.appendChild(b);
  msgs.appendChild(g);
  msgs.scrollTop=msgs.scrollHeight;
}

function showTyping() {
  const msgs=document.getElementById('ai-msgs');
  if(!msgs)return;
  const g=document.createElement('div');
  g.className='msg-g ai'; g.id='typing-g';
  const b=document.createElement('div');
  b.className='bubble ai';
  b.innerHTML='<div class="typing-b"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  g.appendChild(b); msgs.appendChild(g);
  msgs.scrollTop=msgs.scrollHeight;
}
function removeTyping(){document.getElementById('typing-g')?.remove();}

function updateAILimit() {
  const el=document.getElementById('ai-lbl');
  if(!el)return;
  const rem=S.aiMax-S.aiCount;
  el.textContent=S.plan==='pro'?'Неограничен':`${rem} / ${S.aiMax}`;
  el.style.color=S.plan==='free'&&rem<=5?'#e24b4a':'';
}

function fmtAmt(n) {
  const sym = currSymbol();
  const abs = Math.abs(n);
  const sign = n < 0 ? '−' : '+';
  const num = abs.toLocaleString('bg-BG',{minimumFractionDigits:2,maximumFractionDigits:2});
  const prefix = ['€','$','£','Fr'].includes(sym);
  const formatted = prefix ? sym+num : num+' '+sym;
  return (n===0?'':sign) + formatted;
}

function autoCategory(desc) {
  const d = desc.toUpperCase();
  if (/KAUFLAND|LIDL|BILLA|FANTASTICO|METRO|PICARD/.test(d)) return '🛒 Хранителни стоки';
  if (/SHELL|PETROL|LUKOIL|OMV|PARKING|BOLT/.test(d)) return '🚗 Транспорт';
  if (/CEZ|TOPLOFIKACIA|VIVACOM|A1|TELENOR/.test(d)) return '💡 Сметки';
  if (/NETFLIX|SPOTIFY|APPLE|GOOGLE|AMAZON/.test(d)) return '🎬 Абонаменти';
  if (/UBER|TAXIFY|BOLT FOOD/.test(d)) return '🍽️ Храна & доставка';
  if (/ЗАПЛАТА|SALARY|ПРЕВОД|PAYMENT|FREELANCE/.test(d)) return '💼 Приход';
  if (/DEICHMANN|ZARA|HM|MANGO/.test(d)) return '👔 Дрехи';
  return '📦 Разни';
}

function exportInvoicesCSV() {
  if (!invoices.length) { showToast('Няма фактури за експорт'); return; }
  const sym = currSymbol();
  const rows = [
    ['Номер','Тип','Клиент','Дата','Срок','Данъчно събитие','Статус','Нето','ДДС','Общо','Валута','Начин на плащане','Бележки']
  ];
  invoices.forEach(inv => {
    const cl = cliOf(inv.cid);
    const s = sub(inv.items);
    const v = inv.noVat ? 0 : vatAmt(inv.items);
    const t = s + v;
    const st = {paid:'Платена',pending:'Изчаква',draft:'Чернова'}[inv.status]||inv.status;
    rows.push([
      inv.id, inv.type, cl.name||'—',
      inv.date, inv.due||'', inv.tdate||'',
      st,
      s.toFixed(2), v.toFixed(2), t.toFixed(2),
      S.currency,
      inv.pay||'', inv.notes||''
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `фактури-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('✓ CSV изтеглен — готов за счетоводител');
}

// ── Sequential invoice numbering ──────────────────────────────
function nextInvNum() {
  if (!invoices.length) return 'INV-001';
  const nums = invoices
    .map(i => parseInt((i.id||'').replace('INV-','')) || 0)
    .filter(n => !isNaN(n));
  const max = nums.length ? Math.max(...nums) : 0;
  return 'INV-' + String(max + 1).padStart(3, '0');
}

async function newInv() {
  if(S.plan==='free'&&invoices.length>=FREE_INV)return;
  const today=new Date().toISOString().slice(0,10);
  const due=new Date(Date.now()+14*86400000).toISOString().slice(0,10);
  const num = nextInvNum();
  const inv={id:num,type:'Фактура',cid:'',date:today,due,tdate:today,status:'draft',items:[{desc:'',qty:1,price:0,vat:20}],notes:'',noVat:false,vatR:'чл.113 ал.9 от ЗДДС',pay:'По банков път'};
  // Save to Supabase
  if (window._koinUser) {
    try {
      const { data } = await window._supabase.from('invoices').insert({
        user_id: window._koinUser.id,
        number: num,
        type: inv.type,
        date: inv.date,
        due_date: inv.due,
        tax_date: inv.tdate,
        status: inv.status,
        items: inv.items,
        notes: inv.notes,
        no_vat: inv.noVat,
        vat_reason: inv.vatR,
        payment_method: inv.pay,
        currency: S.currency
      }).select().single();
      if (data) inv._uuid = data.id;
    } catch(e) {}
  }
  invoices.unshift(inv);
  S.curInv=inv.id; S.invTab='form';
  renderInvoices(document.getElementById('content'));
  renderInvEditor();
}

function renderItms(items) {

async function saveInv() {
  const inv=invoices.find(i=>i.id===S.curInv);if(!inv)return;
  inv.cid=document.getElementById('f-cli')?.value||inv.cid;

  inv.notes=document.getElementById('f-notes')?.value||'';

  // Save to Supabase
  if (window._koinUser && inv._uuid) {

      await window._supabase.from('invoices').update({
        client_id: inv.cid || null,
        type: inv.type,
        date: inv.date,
        due_date: inv.due,
        tax_date: inv.tdate,

        items: inv.items,

  renderInvoices(document.getElementById('content'));
  document.querySelectorAll('.btn.pri').forEach(b=>{b.textContent='✓ Запазено';setTimeout(()=>b.textContent='PDF',1200);});
}

function renderBudget(c) {
  const totalIncome = categories.income.reduce((s, cat) => s + totalForCat(cat.id), 0);
  const totalExpense = categories.expense.reduce((s, cat) => s + totalForCat(cat.id), 0);
  const balance = totalIncome - totalExpense;

  // Build sidebar categories
  const expRows = categories.expense.map(cat => {
    const spent = totalForCat(cat.id);
    return `<div class="bcat-item${budgetState.activeCat === cat.id ? ' active' : ''}" onclick="selectBudgetCat('${cat.id}')">
      <div class="bcat-dot" style="background:${cat.color}"></div>
      <div class="bcat-name">${cat.emoji} ${cat.name}</div>
      <div class="bcat-total">${fmt(spent)}</div>
    </div>`;
  }).join('');

  const incRows = categories.income.map(cat => {
    const earned = totalForCat(cat.id);
    return `<div class="bcat-item${budgetState.activeCat === cat.id ? ' active' : ''}" onclick="selectBudgetCat('${cat.id}')">
      <div class="bcat-dot" style="background:${cat.color}"></div>
      <div class="bcat-name">${cat.emoji} ${cat.name}</div>
      <div class="bcat-total" style="color:#1D9E75">+${fmt(earned)}</div>

    <div class="budget-sidebar">
      <div class="bcat-hdr">
        <div class="bcat-title">Категории</div>
        <button class="bcat-add" onclick="openCatModal()" title="Добави категория">+</button>

            <span>Разходи</span>
            <span style="color:#e24b4a;font-family:'DM Mono',monospace">${fmt(totalExpense)}</span>
          </div>

          <div class="bcat-section-lbl">
            <span>Приходи</span>
            <span style="color:#1D9E75;font-family:'DM Mono',monospace">+${fmt(totalIncome)}</span>
          </div>
          ${incRows}

        <div class="bsum-lbl">Разходи</div>

        </div>
        <div class="smart-add-title">Умно добавяне</div>

      <div class="smart-add-body">
        <div class="smart-inp-row">

function selectBudgetCat(id) {
  budgetState.activeCat = budgetState.activeCat === id ? null : id;
  const main = document.getElementById('budget-main');
  if (main) {
    main.innerHTML = budgetState.activeCat ? renderBudgetCatDetail() : renderBudgetOverview(
      categories.income.reduce((s, cat) => s + totalForCat(cat.id), 0),
      categories.expense.reduce((s, cat) => s + totalForCat(cat.id), 0),
      categories.income.reduce((s, cat) => s + totalForCat(cat.id), 0) - categories.expense.reduce((s, cat) => s + totalForCat(cat.id), 0)
    );
    // Reattach smart input listener
    const inp = document.getElementById('smart-inp');
    if (inp) inp.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();smartParse();}});
  }
  // Update sidebar active state
  document.querySelectorAll('.bcat-item').forEach(el => {
    const onclick = el.getAttribute('onclick');
    if (onclick && onclick.includes(id)) el.classList.add('active');
    else el.classList.remove('active');
  });
}

function deleteBudgetTx(id) {
  budgetTx = budgetTx.filter(t => t.id !== id);
  renderBudget(document.getElementById('content'));
}

// Smart parse with AI
function smartFill(text) {
  const inp = document.getElementById('smart-inp');
  if (inp) { inp.value = text; inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 80) + 'px'; }
}

async function smartParse() {
  if (S.plan === 'free') { upgrade(); return; }
  const inp = document.getElementById('smart-inp');
  const text = inp?.value.trim();
  if (!text || budgetState.smartLoading) return;

  budgetState.smartLoading = true;
  const btn = document.getElementById('smart-send');
  if (btn) btn.textContent = '⏳ Разпознавам...';

  // Local parse first
  const results = parseSmartInput(text);

  // Try AI enhance
  try {
    const catList = [...categories.expense.map(c => `${c.id}:${c.name}(разход)`), ...categories.income.map(c => `${c.id}:${c.name}(приход)`)].join(', ');
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: `Разпознай покупките/транзакциите от текста и ги категоризирай. Отговори САМО с JSON масив без Markdown.
Текст: "${text}"
Категории: ${catList}
Формат: [{"name":"...", "emoji":"...", "catId":"...", "amount": число, "items":["..."]}]
Правила: ако не знаеш цената, слагай реалистична за България (в лева). emoji трябва да отговаря на продукта.` }],
      })
    });
    if (resp.ok) {
      const data = await resp.json();
      const aiText = data.content?.find(b => b.type === 'text')?.text || '';
      const clean = aiText.replace(/```json|```/g, '').trim();
      const aiResults = JSON.parse(clean);
      if (Array.isArray(aiResults) && aiResults.length > 0) {
        budgetState.smartResults = aiResults;
        showSmartResults(aiResults);
        budgetState.smartLoading = false;
        if (btn) btn.textContent = 'Разпознай →';
        return;
      }
    }
  } catch (e) {}

  // Fallback to local
  budgetState.smartResults = results;
  showSmartResults(results);
  budgetState.smartLoading = false;
  if (btn) btn.textContent = 'Разпознай →';
}

function showSmartResults(results) {
  const container = document.getElementById('smart-results');
  if (!container) return;
  if (!results.length) {
    container.innerHTML = '<div style="font-size:12px;color:#aaa;padding:4px">Не разпознах нищо. Опитай с по-конкретен текст.</div>';
    return;
  }

  const allCats = [...categories.expense, ...categories.income];
  const catOptions = allCats.map(c => `<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');

  const items = results.map((r, i) => `
    <div class="smart-result-item">
      <div class="smart-result-emoji">${r.emoji || '📦'}</div>
      <div class="smart-result-info">
        <div class="smart-result-name">${r.name}</div>
        <select class="smart-result-cat-sel" id="sr-cat-${i}" onchange="updateSmartResult(${i}, 'catId', this.value)">
          ${allCats.map(c => `<option value="${c.id}"${c.id === r.catId ? ' selected' : ''}>${c.emoji} ${c.name}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        <input type="number" step="0.01" value="${r.amount.toFixed(2)}" style="width:70px;text-align:right;padding:3px 6px;border:.5px solid rgba(0,0,0,.14);border-radius:5px;font-size:12px;font-family:'DM Mono',monospace;outline:none" onchange="updateSmartResult(${i}, 'amount', parseFloat(this.value)||0)" />
        <span style="font-size:10px;color:#aaa">лв</span>
      </div>
    </div>`).join('');

  const total = results.reduce((s, r) => s + r.amount, 0);
  container.innerHTML = items + `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:.5px solid rgba(0,0,0,.08);margin-top:4px">
      <span style="font-size:12px;color:#888">Общо: <strong style="font-family:'DM Mono',monospace">${fmtC(total)}</strong></span>
      <div style="display:flex;gap:6px">
        <button onclick="clearSmartResults()" style="padding:5px 12px;border-radius:7px;border:.5px solid rgba(0,0,0,.12);background:transparent;font-size:12px;cursor:pointer;color:#888">Откажи</button>
        <button onclick="confirmSmartResults()" style="padding:5px 12px;border-radius:7px;border:none;background:var(--btn-bg);color:var(--btn-txt);font-size:12px;font-weight:500;cursor:pointer">✓ Добави ${results.length} запис${results.length > 1 ? 'a' : ''}</button>
      </div>
    </div>`;
}

function updateSmartResult(i, field, val) {
  if (budgetState.smartResults[i]) budgetState.smartResults[i][field] = val;
}

function clearSmartResults() {
  budgetState.smartResults = [];
  const container = document.getElementById('smart-results');
  if (container) container.innerHTML = '';
  const inp = document.getElementById('smart-inp');
  if (inp) { inp.value = ''; inp.style.height = 'auto'; }
}

function confirmSmartResults() {
  const today = new Date().toISOString().slice(0, 10);
  budgetState.smartResults.forEach(r => {
    budgetTx.push({
      id: 'bt' + Date.now() + Math.random().toString(36).slice(2,5),
      catId: r.catId,
      name: r.name,
      amount: r.amount,
      date: today,
      items: r.items || []
    });
  });
  clearSmartResults();
  renderBudget(document.getElementById('content'));
}

function saveNewTx() {
  const name = document.getElementById('atx-name')?.value.trim();

function toggleCatType(type) {
  document.getElementById('cat-type-val').value = type;
  document.getElementById('ctype-exp').classList.toggle('active', type==='expense');
  document.getElementById('ctype-inc').classList.toggle('active', type==='income');
}

function selEmoji(el, emoji) {
  document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('cat-emoji').value = emoji;
}
function selColor(el, color) {
  document.querySelectorAll('.color-opt').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('cat-color').value = color;
}

function saveCat(editId) {
  const name = document.getElementById('cat-name')?.value.trim();
  const emoji = document.getElementById('cat-emoji')?.value || '📦';
  const color = document.getElementById('cat-color')?.value || CAT_COLORS[0];
  const budget = parseFloat(document.getElementById('cat-budget')?.value || 0);
  const type = document.getElementById('cat-type-val')?.value || 'expense';
  if (!name) return;
  if (editId) {
    const cat = getCat(editId);
    if (cat) { cat.name = name; cat.emoji = emoji; cat.color = color; cat.budget = budget; }
  } else {
    const newCat = { id: 'cu' + Date.now(), name, emoji, color, budget };
    categories[type].push(newCat);
  }
  closeModal();
  renderBudget(document.getElementById('content'));
}

function deleteCat(id) {
  categories.expense = categories.expense.filter(c => c.id !== id);
  categories.income = categories.income.filter(c => c.id !== id);
  budgetTx = budgetTx.filter(t => t.catId !== id);
  closeModal();
  budgetState.activeCat = null;
  renderBudget(document.getElementById('content'));
}

const OWNER_EMAILS = [

async function initWithAuth() {
  // Handle password reset redirect
  const params = new URLSearchParams(window.location.hash.slice(1));
  if (params.get('type') === 'recovery') {
    showResetPasswordScreen();
    return;
  }
  const user = await window._sbAuth.getUser();
  if (user) {
    window._koinUser = user;
    // Load profile from DB
    try {
      const { data: profile } = await window._supabase
        .from('profiles').select('*').eq('id', user.id).single();
      if (profile) {
        S.plan = profile.plan || 'free';
        S.persona = profile.persona || 'koin';
        S.currency = profile.currency || 'EUR';
        // ai_name е името на асистента, name е истинското им на потребителя
        S.aiName = profile.ai_name || (profile.persona === 'fina' ? 'Fina' : 'Koin');
        S.userName = profile.name || user.email?.split('@')[0] || '';
        document.body.className = S.persona;
      }
    } catch(e) {
      S.aiName = 'Koin';
    }
    // Owner emails → автоматично Pro
    if (OWNER_EMAILS.includes(user.email)) {
      S.plan = 'pro';
    }
    // Load user's data from Supabase
    await loadUserData();
    // Ако няма ai_name — покажи бърз setup
    if (!S.aiName || S.aiName === 'Koin' || S.aiName === 'Fina') {
      const savedName = localStorage.getItem('koin_ai_name');
      if (savedName) {
        S.aiName = savedName;
      }
    }
    // Skip onboarding — go straight to app
    document.getElementById('onboarding').style.display = 'none';
    const app = document.getElementById('app');
    app.style.display = 'flex';
    updateAppHeader();
    goTo('dashboard');
  } else {
    showAuthScreen();
  }
}

async function loadUserData() {
  if (!window._koinUser) return;
  const uid = window._koinUser.id;
  try {
    // Load clients
    const { data: cls } = await window._supabase
      .from('clients').select('*').eq('user_id', uid).order('created_at');
    if (cls) clients = cls.map(c => ({
      id: c.id, name: c.name, eik: c.eik||'', mol: c.mol||'',
      addr: c.addr||'', city: c.city||'', vat: c.vat||'', email: c.email||''
    }));
  } catch(e) {}
  try {
    // Load invoices
    const { data: invs } = await window._supabase
      .from('invoices').select('*').eq('user_id', uid).order('created_at', {ascending:false});
    if (invs) invoices = invs.map(i => ({
      id: i.number, _uuid: i.id, type: i.type, cid: i.client_id||'',
      date: i.date, due: i.due_date||'', tdate: i.tax_date||i.date,
      status: i.status, items: i.items||[], notes: i.notes||'',
      noVat: i.no_vat||false, vatR: i.vat_reason||'', pay: i.payment_method||'По банков път'
    }));
  } catch(e) {}
}

      </div>
    </div>
  `;
}

async function doResetPassword() {
  const pass = document.getElementById('new-pass').value;
  const pass2 = document.getElementById('new-pass2').value;
  const errEl = document.getElementById('reset-err');
  
  if (pass.length < 8) {
    errEl.style.display='block'; errEl.style.color='#e24b4a'; errEl.style.background='#fef2f2';
    errEl.textContent='Паролата трябва да е поне 8 символа'; return;
  }
  if (pass !== pass2) {
    errEl.style.display='block'; errEl.style.color='#e24b4a'; errEl.style.background='#fef2f2';
    errEl.textContent='Паролите не съвпадат'; return;
  }
  
  const { error } = await window._supabase.auth.updateUser({ password: pass });
  if (error) {
    errEl.style.display='block'; errEl.style.color='#e24b4a'; errEl.style.background='#fef2f2';
    errEl.textContent = error.message; return;
  }
  
  errEl.style.display='block'; errEl.style.color='#1D9E75'; errEl.style.background='#f0fdf4';
  errEl.textContent='✓ Паролата е сменена успешно!';
  setTimeout(() => window.location.href = '/', 1500);
}

function showForgotPassword() {
  const email = document.getElementById('auth-email')?.value.trim();
  const errEl = document.getElementById('auth-err');
  const input = email || prompt('Въведи имейл адреса си:');
  if (!input) return;
  
  errEl.style.display = 'none';
  window._supabase.auth.resetPasswordForEmail(input, {
    redirectTo: window.location.origin + '/?reset=true'
  }).then(({ error }) => {
    errEl.style.display = 'block';
    if (error) {
      errEl.style.color = '#e24b4a';
      errEl.style.background = '#fef2f2';
      errEl.textContent = 'Грешка: ' + error.message;
    } else {
      errEl.style.color = '#1D9E75';
      errEl.style.background = '#f0fdf4';
      errEl.textContent = '✓ Изпратихме линк за нова парола на ' + input;
    }
  });
}

function switchAuthTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tab-login').style.background = isLogin ? '#0e1320' : 'transparent';
  document.getElementById('tab-login').style.color = isLogin ? '#c8f075' : '#888';
  document.getElementById('tab-login').style.border = isLogin ? 'none' : '1.5px solid rgba(0,0,0,.12)';
  document.getElementById('tab-signup').style.background = !isLogin ? '#0e1320' : 'transparent';
  document.getElementById('tab-signup').style.color = !isLogin ? '#c8f075' : '#888';
  document.getElementById('tab-signup').style.border = !isLogin ? 'none' : '1.5px solid rgba(0,0,0,.12)';
  document.getElementById('auth-name-wrap').style.display = isLogin ? 'none' : 'block';
  document.getElementById('auth-btn').textContent = isLogin ? 'Влез' : 'Регистрирай се';
  document.getElementById('auth-btn').dataset.tab = tab;
  const fw = document.getElementById('forgot-wrap');
  if (fw) fw.style.display = isLogin ? 'block' : 'none';
}

async function doAuth() {
  const btn = document.getElementById('auth-btn');
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const name = document.getElementById('auth-name')?.value.trim() || '';
  const tab = btn.dataset.tab || 'login';
  const errEl = document.getElementById('auth-err');
  
  if (!email || !pass) { errEl.style.display='block'; errEl.textContent='Попълни всички полета'; return; }
  if (tab === 'signup' && pass.length < 8) { errEl.style.display='block'; errEl.textContent='Паролата трябва да е поне 8 символа'; return; }
  
  btn.textContent = '⏳ Моля изчакай...';
  btn.disabled = true;
  errEl.style.display = 'none';
  
  const { data, error } = tab === 'signup' 
    ? await window._sbAuth.signUp(email, pass, name)
    : await window._sbAuth.signIn(email, pass);
  
  if (error) {
    errEl.style.display = 'block';
    errEl.textContent = error.message === 'Invalid login credentials' 
      ? 'Грешен email или парола' 
      : error.message;
    btn.textContent = tab === 'signup' ? 'Регистрирай се' : 'Влез';
    btn.disabled = false;
    return;
  }
  
  if (tab === 'signup') {
    errEl.style.display = 'block';
    errEl.style.color = '#1D9E75';
    errEl.style.background = '#f0fdf4';
    errEl.textContent = '✓ Провери имейла си за потвърждение!';
    btn.textContent = 'Изпратено ✓';
    return;
  }
  
  window.location.reload();
}
